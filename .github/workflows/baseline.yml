name: GenerateBaseline
'on':
  workflow_dispatch: null
  schedule:
  - cron: 15 02 * * 3
jobs:
  baseline_job:
    if: github.repository_owner == 'playground-nils'
    runs-on: ubuntu-latest
    steps:
    - name: checkout python tools repo
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: Predizioni-Epidemiologiche-Italia/hub-tools
        ref: main
        path: ./tools/
    - name: checkout data repo
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: Predizioni-Epidemiologiche-Italia/Influcast
        ref: main
        path: ./repo/
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install pandas numpy==1.22.4 isoweek==1.3.3
    - name: Pyhton
      id: compute_baseline
      run: 'python ./tools/code/quantile_baseline.py --season "2025-2026"

        '
    - name: Commit data repo changes
      uses: EndBug/add-and-commit@v7
      with:
        cwd: ./repo
        message: Update data storage
        default_author: github_actions
        push: true
    - name: Save changes to artifact
      env:
        changed_files: ${{ steps.compute_baseline.outputs.baseline_file }}
      run: "echo \"{ \\\"pr-changes\\\" : \\\"previsioni/Influcast-quantileBaseline/$changed_files\\\
        \" }\" > pr_changes.json\n  \n"
    - name: Upload changes
      uses: actions/upload-artifact@v4
      with:
        name: pr_changes
        path: ./pr_changes.json

name: FetchSurveillance
'on':
  schedule:
  - cron: 00 18 * * 5
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: fetch-surveillance
  cancel-in-progress: false
jobs:
  fetch-and-pr:
    if: github.repository_owner == 'playground-nils'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.ref }}
    - name: checkout python tools repo
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: Predizioni-Epidemiologiche-Italia/hub-tools
        ref: main
        path: ./tools
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install deps
      run: '# python -m pip install --upgrade pip

        # pip install  pandas beautifulsoup4 numpy isoweek


        python -m pip install -U pip wheel setuptools

        # co-installo numpy+pandas (compatibili) e i parser HTML

        pip install --only-binary=:all: "numpy>=2,<3" "pandas>=2.2,<3"

        pip install requests lxml html5lib beautifulsoup4

        python - <<''PY''

        import numpy, pandas, lxml, bs4, html5lib

        print("numpy", numpy.__version__)

        print("pandas", pandas.__version__)

        print("lxml OK, bs4 OK, html5lib OK")

        PY

        '
    - name: ''
      run: 'python tools/code/parser_respivirnet.py

        '
    - name: List surveillance folders (recursive)
      run: "set -euo pipefail\nfor d in ./sorveglianza/ARI/2025-2026 ./sorveglianza/ARI+_FLU/2025-2026;\
        \ do\n  echo \"::group::Listing $d\"\n  if [ -d \"$d\" ]; then\n    echo \"\
        # ls -laR\"\n    ls -laR \"$d\"\n    echo\n    echo \"# files (path | size\
        \ KB | mtime)\"\n    find \"$d\" -type f -printf \"%p\\t%k KB\\t%TY-%Tm-%Td\
        \ %TH:%TM\\n\" | sort\n  else\n    echo \"Directory not found: $d\"\n  fi\n\
        \  echo \"::endgroup::\"\ndone\n"
    - name: Create PR with changes
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.ACTIONS_BOT_PAT }}
        push-to-fork: M-7th/Influcast-Fork
        commit-message: 'surveillance: add weekly ISS data (auto)'
        branch: bot/iss-${{ github.run_id }}
        base: main
        title: 'Surveillance: weekly ISS data'
        body: 'Automated PR adding weekly surveillance data (ARI, ARI+_FLU).

          - Timezone: Europe/Rome

          - If files already existed, no changes were committed.

          '
        add-paths: './sorveglianza/ARI/**

          ./sorveglianza/ARI+_FLU/**

          '
        labels: 'automation

          surveillance

          '
        draft: false
        signoff: false
